name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # bundle.sh stamps the version from `git describe --tags`
      - name: Build app bundle
        run: ./scripts/bundle.sh
      - name: Package dmg
        run: |
          mkdir dmg-root
          cp -R dist/Tokei.app dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create -volname Tokei -srcfolder dmg-root -ov -format UDZO "Tokei-${{ github.ref_name }}.dmg"
      - name: Create GitHub release
        run: gh release create "${{ github.ref_name }}" Tokei-*.dmg --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
